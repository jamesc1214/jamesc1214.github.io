<!DOCTYPE html>
<html>

.speech-bubble {
    position: relative;
    
    top: 20px;
    left: 20px;
    z-index: 2;
    
    background-color: rgb(194, 194, 255);
    color: #111111;
    padding: 12px 16px;
    
    border: 6px solid #333333;
    border-radius: 60px;
    margin: 10px;
    
    max-width: 600px;
    font-size: 60px;
    line-height: 1.4;
}
    
<body>
    <img src="images/storyboard.jpg" alt="story">
    <div class="speech-bubble">What am I looking at...</div>
</div>
</body>
